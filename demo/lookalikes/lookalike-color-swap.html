<!doctype html>
<!--
  Atlas demo asset — BRAND-COLOR-SWAP LOOKALIKE.

  Public URL (demo hosting): https://app-acmecorp.test/signin
  Anomalies vs the legit reference (legit-acmecorp.html):

    * Brand primary color drifted (#21508C vs canonical #1A2B45) — visually
      similar but measurably different in vision diff.
    * Brand accent color swapped to a cooler hue (#54B0FF vs #FFB347).
    * Footer copyright year stale (2025 vs current 2026).
    * Nav contains a stale "Beta" callout no longer present on the canonical page.
    * Domain is a subdomain of "app-acmecorp.test" (not the canonical
      acmecorp-demo.test) — pretextually plausible but not the brand.

  These anomalies are declared in code in
  backend/app/modules/visual_data.py so the mock path emits findings
  even when the Claude vision call is unavailable.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AcmeCorp — Sign in</title>
  <style>
    :root {
      /* Anomaly: brand colors drifted from canonical tokens. */
      --brand: #21508C;
      --brand-accent: #54B0FF;
      --ink: #1a1a1a;
      --muted: #6b7280;
      --bg: #f7f8fa;
      --card: #ffffff;
      --rule: #e5e7eb;
      --font: "Inter", -apple-system, "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font); }
    .top { background: var(--brand); color: white; padding: 14px 32px; display: flex; align-items: center; gap: 16px; }
    .logo { font-weight: 700; letter-spacing: -0.02em; font-size: 20px; }
    .logo span { color: var(--brand-accent); }
    .top nav a { color: rgba(255,255,255,0.85); text-decoration: none; margin-left: 24px; font-size: 14px; }
    .top .pill { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--brand-accent); color: var(--brand); margin-left: 8px; letter-spacing: 0.05em; }
    main { display: flex; justify-content: center; padding: 64px 24px; }
    .card { background: var(--card); border: 1px solid var(--rule); border-radius: 10px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); }
    .card h1 { margin: 0 0 8px; font-size: 22px; font-weight: 600; }
    .card p.sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
    label { display: block; font-size: 13px; color: #374151; margin: 12px 0 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid var(--rule);
      border-radius: 6px; font-size: 14px;
    }
    button.primary {
      width: 100%; margin-top: 20px; padding: 12px 14px; border: none;
      background: var(--brand); color: white; font-size: 15px; font-weight: 600;
      border-radius: 6px; cursor: pointer;
    }
    .legal { margin-top: 24px; font-size: 12px; color: var(--muted); text-align: center; }
    .legal a { color: var(--brand); text-decoration: none; }
    footer { padding: 32px 24px; text-align: center; color: var(--muted); font-size: 12px; }
    footer a { color: var(--muted); text-decoration: none; margin: 0 8px; }
  </style>
</head>
<body>
  <header class="top">
    <div class="logo">Acme<span>Corp</span></div>
    <nav>
      <a href="/product">Product</a>
      <a href="/pricing">Pricing</a>
      <!-- Anomaly: stale "Beta" tag — not present on the current canonical page. -->
      <a href="/customers">Customers<span class="pill">BETA</span></a>
      <a href="/docs">Docs</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <h1>Sign in to AcmeCorp</h1>
      <p class="sub">Welcome back. Sign in to your workspace.</p>
      <form action="/auth/login" method="post">
        <label for="email">Work email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button class="primary" type="submit">Sign in to AcmeCorp</button>
      </form>
      <p class="legal">
        By signing in, you agree to AcmeCorp's
        <a href="/legal/terms">Terms</a> and
        <a href="/legal/privacy">Privacy Policy</a>.
      </p>
    </section>
  </main>
  <footer>
    <a href="https://app-acmecorp.test">app-acmecorp.test</a> ·
    <a href="/support">Support</a> ·
    <!-- Anomaly: stale copyright year. -->
    © 2025 AcmeCorp, Inc.
  </footer>
</body>
</html>
